services:
  - type: web
    name: nova-unh-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_LIVE_MODEL
        value: gemini-3.1-flash-live-preview
